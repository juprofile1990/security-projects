<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Incident Command</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages 404s on a sub-route, this page encodes the original
      // path into the query string and redirects to the root index.html,
      // which then restores it using history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
